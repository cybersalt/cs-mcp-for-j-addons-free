PLG_SYSTEM_CSMCPFORJAKEEBABACKUP="System - MCP for Joomla: Akeeba Backup add-on"
PLG_SYSTEM_CSMCPFORJAKEEBABACKUP_XML_DESCRIPTION="MCP tools for the Akeeba Backup Core (com_akeebabackup) extension. Lets Claude list profiles, list/inspect backup records, start and step backups, and manage archives — all against the same engine the admin UI uses. Restore stays human-driven (in Core, restore is via the external Kickstart script anyway)."
