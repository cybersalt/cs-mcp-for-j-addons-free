PLG_SYSTEM_CSMCPFORJAKEEBABACKUP="System - MCP for Joomla: Akeeba Backup add-on"
PLG_SYSTEM_CSMCPFORJAKEEBABACKUP_XML_DESCRIPTION="Adds MCP tools for the Akeeba Backup Core extension (com_akeebabackup). Tools work against the same models the admin UI uses — list profiles, list/inspect backup records, start and step backups, download or delete archives. Restore is intentionally not exposed (Akeeba Backup Core has no in-admin restore — restore is via the external Kickstart script)."
